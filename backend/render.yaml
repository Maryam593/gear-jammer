services:
  - type: web
    name: eld-trip-planner-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn eld_planner.wsgi
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: gear-jammer.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://gear-jammer.vercel.app
      - key: PYTHON_VERSION
        value: 3.12.7
